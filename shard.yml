name: placeos-resource
version: 3.1.3
crystal: ">= 1.0.0"

dependencies:
  # Tuple based logs
  log_helper:
    github: spider-gazelle/log_helper
    version: ~> 1.0

  # Simple async abstraction
  promise:
    github: spider-gazelle/promise
    version: ~> 3.0

  # ORM for Postgres built on active-model
  pg-orm:
    github: spider-gazelle/pg-orm

  # Retry with exponential backoff
  simple_retry:
    github: spider-gazelle/simple_retry

development_dependencies:
  # Log backend
  action-controller:
    github: spider-gazelle/action-controller
    version: ">= 4"

  # Linter
  ameba:
    github: crystal-ameba/ameba
    version: ">= 0.14"
